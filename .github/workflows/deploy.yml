name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Generate Catalog
        run: |
          if [ -f scripts/generate-catalog.js ]; then
            node scripts/generate-catalog.js
          else
            echo "Catalog generation script not found, skipping."
          fi
        
      - name: Build project
        run: npm run build

      - name: Copy 404.html for SPA Routing
        run: cp dist/index.html dist/404.html || true
        
      - name: Copy Exam Files to Dist
        run: |
          for dir in networking devops python-full-stack mern-stack flutter cyber-security digital-marketing data-science; do
            if [ -d "$dir" ]; then
              cp -r "$dir" dist/
            fi
          done
          
      - name: Setup Pages
        uses: actions/configure-pages@v6
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
