<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synnefo Mock Exams | Secure Archive</title>
  <meta name="description" content="Access the newest question papers and practice tests across all IT and Business training departments." />

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Monument+Extended:wght@800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Synnefo Mock Exams — Particles.js Experience
       ============================================================ */
    :root {
      --bg-color: #d9dee3; /* Igloo style light misty background */
      --text-main: #1a1a1a;
      --text-muted: #6b7280;
      --accent: #000000;
      
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: sans-serif; /* Fallback for heavy display text */

      --border-thin: 1px solid rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-mono);
      overflow: hidden; /* No scrolling, immersive experience */
      user-select: none;
      cursor: crosshair;
    }

    /* === PARTICLES CONTAINER === */
    #particles-js {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle, #e2e8f0 0%, #cbd5e1 100%);
    }

    /* === HUD OVERLAY === */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none; /* Let clicks pass through to UI elements */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
    }

    .hud-element {
      pointer-events: auto;
    }

    /* --- TOP BAR --- */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -1px;
      color: var(--text-main);
    }

    .status-panel {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.5;
    }

    .status-active {
      color: var(--text-main);
      font-weight: 700;
    }

    /* --- CROSSHAIRS & BRACKETS --- */
    .crosshair-h, .crosshair-v {
      position: absolute;
      background: rgba(0,0,0,0.1);
      z-index: 1;
      pointer-events: none;
    }
    .crosshair-h { top: 50%; left: 0; width: 100%; height: 1px; }
    .crosshair-v { top: 0; left: 50%; width: 1px; height: 100%; }
    
    .target-brackets {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 400px;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 4px;
      pointer-events: none;
    }
    .target-brackets::before, .target-brackets::after {
      content: ''; position: absolute; width: 20px; height: 20px; border: 1.5px solid rgba(0,0,0,0.3);
    }
    .target-brackets::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .target-brackets::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

    /* --- CENTER NAVIGATION --- */
    .center-nav {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      z-index: 10;
    }
    
    .nav-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      position: relative;
      transition: all 0.3s;
      text-align: center;
      display: inline-block;
      width: max-content;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--text-main);
      font-weight: 700;
      transform: scale(1.05);
    }

    .nav-btn::before, .nav-btn::after {
      content: '';
      position: absolute;
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
    }
    .nav-btn::before { content: '['; left: -15px; }
    .nav-btn::after { content: ']'; right: -15px; }

    .nav-btn:hover::before, .nav-btn.active::before { opacity: 1; left: -20px; }
    .nav-btn:hover::after, .nav-btn.active::after { opacity: 1; right: -20px; }

    /* --- DATA PANEL (EXAM LINKS) --- */
    .data-panel {
      position: absolute;
      top: 50%;
      right: 5%;
      transform: translateY(-50%);
      width: 350px;
      max-height: 70vh;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      border: var(--border-thin);
      border-radius: 8px;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }
    
    .data-panel.is-visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .data-panel h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      border-bottom: var(--border-thin);
      padding-bottom: 0.5rem;
    }

    .exam-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .exam-list a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      transition: opacity 0.2s;
    }
    .exam-list a::before {
      content: '>';
      margin-right: 8px;
      font-weight: 700;
      color: rgba(0,0,0,0.3);
    }
    .exam-list a:hover {
      opacity: 0.6;
    }

    /* Hide standard lists stored for JS logic */
    .raw-data { display: none; }

  </style>

  <!-- IMPORTANT: Load particles.js and GSAP via CDN -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

</head>
<body>

  <!-- RAW DATA STORAGE FOR PYTHON TO INJECT INTO -->
  <div class="raw-data" id="data-networking"><ul>$networking_links</ul></div>
  <div class="raw-data" id="data-cyber-security"><ul>$cyber_security_links</ul></div>
  <div class="raw-data" id="data-devops"><ul>$devops_links</ul></div>
  <div class="raw-data" id="data-flutter"><ul>$flutter_links</ul></div>
  <div class="raw-data" id="data-mern-stack"><ul>$mern_stack_links</ul></div>
  <div class="raw-data" id="data-python"><ul>$python_links</ul></div>
  <div class="raw-data" id="data-digital-marketing"><ul>$digital_marketing_links</ul></div>

  <!-- PARTICLES.JS CONTAINER -->
  <div id="particles-js"></div>

  <!-- HUD OVERLAY -->
  <div id="hud">
    
    <div class="top-bar">
      <div class="logo hud-element">SYNNEFO</div>
      <div class="status-panel hud-element">
        <div>SYS.ARCHIVE_02</div>
        <div>SECURE LINK: <span class="status-active">ESTABLISHED</span></div>
        <div id="fps-counter">SCAN RATE: OPTIMAL</div>
      </div>
    </div>

    <div class="crosshair-h"></div><div class="crosshair-v"></div>
    <div class="target-brackets"></div>

    <!-- CENTER NAVIGATION -->
    <div class="center-nav hud-element">
      <div class="nav-label">TARGET DEPT.</div>
      <button class="nav-btn" data-target="networking">Networking</button>
      <button class="nav-btn" data-target="cyber-security">Cyber Security</button>
      <button class="nav-btn" data-target="devops">DevOps</button>
      <button class="nav-btn" data-target="flutter">Flutter</button>
      <button class="nav-btn" data-target="mern-stack">MERN Stack</button>
      <button class="nav-btn" data-target="python">Python</button>
      <button class="nav-btn" data-target="digital-marketing">Digital Marketing</button>
    </div>

    <!-- DATA PANEL THAT POPS UP -->
    <div class="data-panel hud-element" id="dataPanel">
      <h2 id="panelTitle">Select Department</h2>
      <ul class="exam-list" id="panelList">
        <!-- JS will populate this -->
      </ul>
    </div>

  </div>

  <script>
    // ──────────────────────────────────────
    // 1. INITIALIZE PARTICLES.JS
    // ──────────────────────────────────────
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 110,
          "density": { "enable": true, "value_area": 800 }
        },
        "color": { "value": "#8892b0" },
        "shape": { "type": "circle" },
        "opacity": {
          "value": 0.4,
          "random": false,
          "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
        },
        "size": {
          "value": 2,
          "random": true,
          "anim": { "enable": false }
        },
        "line_linked": {
          "enable": true,
          "distance": 160,
          "color": "#8892b0",
          "opacity": 0.25,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 0.8,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": { "enable": false }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "grab": { "distance": 220, "line_linked": { "opacity": 0.7 } },
          "push": { "particles_nb": 3 }
        }
      },
      "retina_detect": true
    });

    // ──────────────────────────────────────
    // 2. HUD INTERACTION LOGIC (GSAP)
    // ──────────────────────────────────────
    const navBtns = document.querySelectorAll('.nav-btn');
    const dataPanel = document.getElementById('dataPanel');
    const panelTitle = document.getElementById('panelTitle');
    const panelList = document.getElementById('panelList');
    const targetBrackets = document.querySelector('.target-brackets');

    navBtns.forEach((btn, index) => {
        btn.addEventListener('click', () => {
            // Remove active from all
            navBtns.forEach(b => b.classList.remove('active'));
            // Set active
            btn.classList.add('active');

            const targetId = btn.getAttribute('data-target');
            
            // Spin and shrink brackets to target
            gsap.fromTo(targetBrackets, 
                { scale: 1.5, rotate: 45, opacity: 0 },
                { scale: 1, rotate: 0, opacity: 1, duration: 1, ease: "back.out(1.7)" }
            );

            // Fetch data from hidden DOM generated by Python
            const rawDataEl = document.getElementById(`data-${targetId}`);
            let htmlContent = '<p class="status-active" style="font-size:0.7em;">[NO DATA]</p>';
            if(rawDataEl && rawDataEl.innerHTML) {
                const list = rawDataEl.querySelector('ul');
                if(list && list.children.length > 0) {
                    htmlContent = list.innerHTML;
                }
            }

            // Animate Data Panel out, update content, animate in
            gsap.to(dataPanel, {
                opacity: 0,
                x: 50,
                duration: 0.3,
                onComplete: () => {
                    panelTitle.textContent = btn.textContent + " // ARCHIVE";
                    panelList.innerHTML = htmlContent;
                    
                    dataPanel.classList.add('is-visible');
                    gsap.to(dataPanel, {
                        opacity: 1,
                        x: 0,
                        duration: 0.6,
                        ease: "power3.out"
                    });
                }
            });
        });
    });

  </script>
</body>
</html>
