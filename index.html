<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synnefo Mock Tests</title>
  <meta name="description" content="Access the newest question papers and practice tests across all IT and Business training departments." />

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Monument+Extended:wght@800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Synnefo Mock Exams — Terminal OS Layout
       ============================================================ */
    :root {
      --bg-color: #0d1117; /* Deep space github dark */
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --card-bg: rgba(22, 27, 34, 0.7);
      
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Monument Extended', sans-serif;
      --font-ui: 'Outfit', sans-serif;

      --border-thin: 1px solid rgba(255,255,255,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-ui);
      overflow: hidden; 
      user-select: none;
    }

    /* === PARTICLES CONTAINER === */
    #particles-js {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
    }

    /* === FOREGROUND HUD === */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      display: grid;
      grid-template-columns: 400px 1fr;
      grid-template-rows: auto 1fr;
      padding: 0;
    }

    .hud-element {
      pointer-events: auto;
    }

    /* --- TOP HEADER (Spans full width) --- */
    header {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 3rem;
      border-bottom: var(--border-thin);
      background: rgba(13, 17, 23, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -1px;
      color: #fff;
    }

    .system-status {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      border-left: var(--border-thin);
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #3fb950;
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 10px #3fb950;
    }

    .header-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      background: rgba(88, 166, 255, 0.1);
    }

    /* --- LEFT SIDEBAR (Departments) --- */
    .sidebar {
      grid-column: 1;
      grid-row: 2;
      border-right: var(--border-thin);
      background: rgba(13, 17, 23, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    .nav-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .nav-btn {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.05);
      border-left: 3px solid transparent;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      color: var(--text-main);
      font-family: var(--font-ui);
      font-size: 1.1rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      position: relative;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-btn::after {
      content: '→';
      font-family: var(--font-mono);
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
      color: var(--accent);
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255,255,255,0.1);
    }

    .nav-btn.active {
      background: rgba(88, 166, 255, 0.1);
      border-color: rgba(88, 166, 255, 0.2);
      border-left-color: var(--accent);
      padding-left: 2rem;
    }

    .nav-btn:hover::after, .nav-btn.active::after {
      opacity: 1;
      transform: translateX(0);
    }

    /* --- MAIN CONTENT AREA (Data Panel) --- */
    .main-content {
      grid-column: 2;
      grid-row: 2;
      padding: 4rem;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .data-panel {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 3rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    
    .data-panel.is-visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .data-panel h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: -1px;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: var(--border-thin);
      color: #fff;
    }

    .exam-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .exam-list a {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .exam-list a::before {
      content: '📄';
      margin-right: 12px;
      font-size: 1.1rem;
      opacity: 0.7;
      transition: all 0.3s;
    }

    .exam-list a:hover {
      background: rgba(88, 166, 255, 0.05);
      border-color: rgba(88, 166, 255, 0.3);
      color: var(--text-main);
      transform: translateY(-2px);
    }
    
    .exam-list a:hover::before {
      opacity: 1;
    }

    /* Hide standard lists stored for JS logic */
    .raw-data { display: none; }
    
    /* Crosshairs overlay for aesthetic */
    .crosshair {
        position: absolute;
        width: 30px; height: 30px;
        border: 2px solid rgba(255,255,255,0.1);
        pointer-events: none;
    }
    .ch-tl { top: 4rem; left: 4rem; border-right: none; border-bottom: none; }
    .ch-br { bottom: 4rem; right: 4rem; border-left: none; border-top: none; }

  </style>

  <!-- IMPORTANT: Load particles.js -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

</head>
<body>

  <!-- RAW DATA STORAGE FOR PYTHON TO INJECT INTO -->
  <div class="raw-data" id="data-networking"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-cyber-security"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-devops"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-flutter"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-mern-stack"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-python"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>
  <div class="raw-data" id="data-digital-marketing"><ul><p class="empty-state">No exams uploaded yet.</p></ul></div>

  <!-- PARTICLES.JS CONTAINER -->
  <div id="particles-js"></div>

  <!-- HUD OVERLAY -->
  <div id="hud">
    
    <!-- HEADER -->
    <header class="hud-element">
      <div class="logo-container">
        <div class="logo">SYNNEFO</div>
        <div class="system-status">
            <div><span class="status-dot"></span> SECURE SERVER LINKED</div>
            <div>AUTH: ROOT_ACCESS_GRANTED</div>
        </div>
      </div>
      <div class="header-title">MOCK TESTS</div>
    </header>

    <!-- SIDEBAR (DEPARTMENTS) -->
    <div class="sidebar hud-element">
      <div class="nav-label">Directories</div>
      <button class="nav-btn" data-target="networking">Networking</button>
      <button class="nav-btn" data-target="cyber-security">Cyber Security</button>
      <button class="nav-btn" data-target="devops">DevOps</button>
      <button class="nav-btn" data-target="flutter">Flutter</button>
      <button class="nav-btn" data-target="mern-stack">MERN Stack</button>
      <button class="nav-btn" data-target="python">Python</button>
      <button class="nav-btn" data-target="digital-marketing">Digital Marketing</button>
    </div>

    <!-- MAIN CONTENT (DATA PANEL) -->
    <div class="main-content">
        <div class="crosshair ch-tl"></div>
        <div class="crosshair ch-br"></div>
        
        <div class="data-panel hud-element" id="dataPanel">
          <h2 id="panelTitle">Select a Directory</h2>
          <ul class="exam-list" id="panelList">
            <!-- JS will populate this -->
          </ul>
        </div>
    </div>

  </div>

  <script>
    // ──────────────────────────────────────
    // 1. INITIALIZE PARTICLES.JS (Dark "Cyber" Web)
    // ──────────────────────────────────────
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#58a6ff" }, /* Accent blue connecting dots */
        "shape": { "type": "circle" },
        "opacity": { "value": 0.5, "random": false, "anim": { "enable": false } },
        "size": { "value": 3, "random": true, "anim": { "enable": false } },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#8b949e", /* Subtle gray web */
          "opacity": 0.2,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 1.2,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "grab": { "distance": 200, "line_linked": { "opacity": 0.5 } },
          "push": { "particles_nb": 3 }
        }
      },
      "retina_detect": true
    });

    // ──────────────────────────────────────
    // 2. HUD INTERACTION LOGIC (Vanilla JS)
    // ──────────────────────────────────────
    const navBtns = document.querySelectorAll('.nav-btn');
    const dataPanel = document.getElementById('dataPanel');
    const panelTitle = document.getElementById('panelTitle');
    const panelList = document.getElementById('panelList');

    navBtns.forEach((btn) => {
        btn.addEventListener('click', () => {
            // Remove active from all
            navBtns.forEach(b => b.classList.remove('active'));
            // Set active
            btn.classList.add('active');

            const targetId = btn.getAttribute('data-target');
            
            // Fetch data from hidden DOM generated by Python
            const rawDataEl = document.getElementById(`data-${targetId}`);
            let htmlContent = '<p style="color:var(--text-muted); font-family:var(--font-mono);">No testing material found.</p>';
            if(rawDataEl && rawDataEl.innerHTML) {
                const list = rawDataEl.querySelector('ul');
                if(list && list.children.length > 0) {
                    htmlContent = list.innerHTML;
                }
            }

            // Animate Data Panel out, update content, animate in
            dataPanel.classList.remove('is-visible');
            
            setTimeout(() => {
                panelTitle.textContent = btn.textContent;
                panelList.innerHTML = htmlContent;
                dataPanel.classList.add('is-visible');
            }, 300); // Wait for CSS opacity transition
        });
    });

  </script>
</body>
</html>
